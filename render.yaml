services:
  # Base de données PostgreSQL
  - type: pserv
    name: dfc-galery-db
    env: node
    plan: free
    databaseName: dfcgalery
    databaseUser: disciplesfc
    healthCheckPath: /health
    
  # Application FastAPI
  - type: web
    name: dfc-galery-api
    env: python
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app.main:app
    healthCheckPath: /health
    envVars:
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: WEB_CONCURRENCY
        value: "2"
      # Variables privées à définir via le dashboard Render:
      # DATABASE_URL (auto-généré par Render)
      # SECRET_KEY
      # CLOUDINARY_CLOUD_NAME
      # CLOUDINARY_API_KEY  
      # CLOUDINARY_API_SECRET
      # IMGBB_API_KEY